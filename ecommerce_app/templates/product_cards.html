{% load static %}


<div class="flex justify-center gap-2 md:gap-8 mx-2 md:mx-8 my-8 flex-wrap">
    {% for product in products %}
        <div class="w-52 md:w-64 p-2 md:p-3 rounded-lg shadow-sm bg-white {% if product.id in cart_products %}shadow-green-300 border-1 border-green-300{% endif %}">
            <div class="flex items-center {% if product.is_trend or product.is_top_of_category %}justify-between{% else %}justify-end{% endif %}">
                {% include 'manage_tags.html' %}
                
                {% include 'manage_favorites.html' %}
            </div>
            <a href="{% url 'detail' product.id %}" aria-label="{{ product.name }}" class="flex justify-center">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="size-32 md:size-40">
            </a>
            <hr class="w-full my-1 md:my-3 text-gray-300">
            <div class="flex flex-col justify-between space-y-10">
                <div>
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-circle text-xs text-orange-400"></i>
                        <p>{{ product.category }}</p>
                    </div>
                    <a href="{% url 'detail' product.id %}" aria-label="{{ product.name }}">
                        <p class="md:text-lg font-semibold leading-tight truncate w-full">
                            {{ product.name }}
                        </p>
                    </a>
                    <div class="flex items-center justify-between gap-3">
                        <p class="text-xl font-semibold">€ {{ product.price|floatformat:0 }}</p>
    
                        {% include 'manage_cart_quantity.html' %}
                    </div>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
